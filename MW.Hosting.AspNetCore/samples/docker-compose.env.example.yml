# Docker Compose environment variable mapping example for MW.Hosting.AspNetCore
# These variables map to .NET configuration binding conventions (__ for nesting)

# === Consul Configuration ===
# environment:
#   - Consul__Enabled=true
#   - Consul__ServiceId=order-service-1
#   - Consul__ServiceName=order-service
#   - Consul__ConsulAddress=http://s_consul:8500
#   - Consul__ServiceAddress=http://c_api_order:33000
#   - Consul__HealthCheckPath=/api/health
#   - Consul__HealthCheckInterval=10s
#   - Consul__HealthCheckTimeout=5s
#   - Consul__DeregisterCriticalServiceAfter=30s
#   - Consul__Tags__0=api
#   - Consul__Tags__1=order

# === CORS Configuration ===
# environment:
#   - Cors__PolicyName=DefaultPolicy
#   - Cors__AllowedOrigins__0=http://localhost:3000
#   - Cors__AllowedOrigins__1=https://mybid.example.com
#   - Cors__AllowAnyHeader=true
#   - Cors__AllowAnyMethod=true
#   - Cors__AllowCredentials=true

# === Graylog Configuration ===
# environment:
#   - Graylog__Enabled=true
#   - Graylog__Host=c_graylog
#   - Graylog__Port=12201
#   - Graylog__Facility=order-service
#   - Graylog__TransportType=Udp

# === Health Endpoints ===
# environment:
#   - HealthEndpoints__Path=/api/health
#   - HealthEndpoints__ReadinessPath=/api/health/ready
#   - HealthEndpoints__LivenessPath=/api/health/live
#   - HealthEndpoints__UsePlainTextResponse=true
#   - HealthEndpoints__PlainText=Ok

# === Full docker-compose example ===
# services:
#   order-api:
#     image: mybid/order-service:latest
#     environment:
#       - ASPNETCORE_ENVIRONMENT=Production
#       - Consul__Enabled=true
#       - Consul__ServiceId=order-service-1
#       - Consul__ServiceName=order-service
#       - Consul__ConsulAddress=http://s_consul:8500
#       - Consul__ServiceAddress=http://c_api_order:33000
#       - Consul__HealthCheckPath=/api/health
#       - Cors__AllowedOrigins__0=https://mybid.example.com
#       - Graylog__Enabled=true
#       - Graylog__Host=c_graylog
#       - Graylog__Port=12201
#       - Graylog__Facility=order-service
#     depends_on:
#       - consul
#       - graylog
